<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Statistics</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="statistics-page" onload="loadUserProfile(); initStatisticsPage();">

<div class="sidebar">
  <h2>Study Planner</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="courses.html">Courses</a>
  <a href="deadlines.html">Deadlines</a>
  <a href="availability.html">Availability</a>
  <a href="statistics.html" class="active">Statistics</a>
  <a href="index.html">Log out</a>
</div>

<div class="main">
  <h1>Study Statistics</h1>

  <div class="top-user">
    <span id="userNameDisplay"></span>
    <img id="userAvatar" class="user-avatar" src="female.png">
  </div>

  <div class="stats-container">
    <div class="stats-left">
      <table id="statsTable">
        <thead>
          <tr>
            <th>Day</th>
            <th>Hours</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="stats-right">
      <div id="chartContainer"></div>
    </div>
  </div>

  
  <p class="stats-note">
    Weekly Study Performance Summary
    
  </p>

  <div class="stats-cards">
    <div class="stat-card">
      <div class="number" id="totalHours">0</div>
      <div class="label">Total Hours</div>
    </div>

    <div class="stat-card completed">
      <div class="number" id="completedSessions">0</div>
      <div class="label">Completed</div>
    </div>

    <div class="stat-card missed">
      <div class="number" id="missedSessions">0</div>
      <div class="label">Missed</div>
    </div>
  </div>
</div>

<script>
const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function getAvailability(){
  return JSON.parse(localStorage.getItem("ssp_availability")) ||
         JSON.parse(localStorage.getItem("availability")) || {};
}

function getDeadlines(){
  return JSON.parse(localStorage.getItem("ssp_deadlines")) ||
         JSON.parse(localStorage.getItem("deadlines")) || [];
}

function getCompleted(){
  return JSON.parse(localStorage.getItem("ssp_completedTasks") || "{}");
}

function buildPlan(){
  const availability = getAvailability();
  const deadlines = getDeadlines().sort((a,b)=>new Date(a.date)-new Date(b.date));

  const plan = {};
  let index = 0;

  days.forEach(day=>{
    plan[day]=[];
    let slots = Number(availability[day]||0);

    for(let i=0;i<slots;i++){
      if(deadlines.length===0) break;

      let t = deadlines[index % deadlines.length];

      plan[day].push({
        id: `merged-${day}-${i}-${t.course || "Course"}-${t.name || t.examName || "Study Session"}`
      });

      index++;
    }
  });

  return {plan,availability};
}

function countCompleted(items,completed){
  let count=0;
  items.forEach(item=>{
    if(completed[item.id]) count++;
  });
  return count;
}

function renderTable(){
  const tbody=document.querySelector("#statsTable tbody");
  const completed=getCompleted();
  const {plan,availability}=buildPlan();

  tbody.innerHTML="";

  days.forEach(day=>{
    let hours=Number(availability[day]||0);
    let items=plan[day];
    let done=countCompleted(items,completed);

    let status = (hours>0 && done===hours)
      ? '<span class="status-completed">✓ Completed</span>'
      : '<span class="status-missed">✗ Missed</span>';

    let row=document.createElement("tr");
    row.innerHTML=`
      <td>${day}</td>
      <td>${hours}</td>
      <td>${status}</td>
    `;
    tbody.appendChild(row);
  });
}

function renderBars(){
  const container=document.getElementById("chartContainer");
  const completed=getCompleted();
  const {plan}=buildPlan();

  container.innerHTML="";

  const max = Math.max(...days.map(d=>countCompleted(plan[d],completed)),1);

  days.forEach(day=>{
    let done=countCompleted(plan[day],completed);
    let width = done>0 ? (done/max)*100 : 0;

    let row=document.createElement("div");
    row.classList.add("bar-row");

    row.innerHTML=`
      <span class="day-name">${day}</span>
      <div class="bar" style="width:${width}%">${done}h</div>
    `;

    container.appendChild(row);
  });
}

function renderCards(){
  const completed=getCompleted();
  const {plan,availability}=buildPlan();

  let total=0,done=0,miss=0;

  days.forEach(day=>{
    let hours=Number(availability[day]||0);
    let items=plan[day];
    let c=countCompleted(items,completed);

    total+=hours;
    done+=c;
    miss+=Math.max(items.length-c,0);
  });

  document.getElementById("totalHours").innerText=total+"h";
  document.getElementById("completedSessions").innerText=done;
  document.getElementById("missedSessions").innerText=miss;
}

function initStatisticsPage(){
  renderTable();
  renderBars();
  renderCards();
}
</script>

<script src="script.js"></script>
</body>
</html>
