<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Courses</title>
<link rel="stylesheet" href="style.css">

</head>

<body>
<body onload="loadUserProfile();">

<div class="sidebar">
  <h2>Study Planner</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="courses.html" class="active">Courses</a>
  <a href="deadlines.html">Deadlines</a>
  <a href="availability.html">Availability</a>
  <a href="statistics.html">Statistics</a>
  <a href="index.html">Log out</a>
</div>

<div class="main">
  <h1>📚 Courses</h1>
<div class="top-user">
  <span id="userNameDisplay"></span>
  <img id="userAvatar" class="user-avatar" src="female.png">
</div>

  <!-- Stats -->
  <div class="course-stats">
    <div class="stat-box">
      <div class="number" id="totalCourses">0</div>
      <div class="label">Total Courses</div>
    </div>
    <div class="stat-box">
      <div class="number" id="totalHours">0h</div>
      <div class="label">Total Hours</div>
    </div>
  </div>

  <div class="card">
    <!-- Add Form -->
    <div class="add-form">
      <input type="text" id="courseName" placeholder="📖 Course Name">
      <input type="number" id="hours" placeholder="⏰ Credit Hours" min="1">
      <button onclick="addCourse()">+ Add Course</button>
    </div>

    <!-- Table -->
    <table id="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Course Name</th>
          <th>Credit Hours</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="emptyMsg" style="display: none;">
      <span>📚</span>
      <p>No courses added yet. Start by adding your first course!</p>
    </div>
  </div>
</div>

<script>
let courses = JSON.parse(localStorage.getItem("courses")) || [];
let nextId = courses.length > 0 ? Math.max(...courses.map(c => c.id)) + 1 : 1;

function isDuplicate(name, excludeId = null) {
  return courses.some(c =>
    c.name.toLowerCase() === name.toLowerCase() && c.id !== excludeId
  );
}

function updateStats() {
  document.getElementById("totalCourses").innerText = courses.length;
  const totalHours = courses.reduce((sum, c) => sum + c.hours, 0);
  document.getElementById("totalHours").innerText = totalHours + "h";
}

function render() {
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  if (courses.length === 0) {
    document.getElementById("emptyMsg").style.display = "block";
    document.querySelector("#table thead").style.display = "none";
  } else {
    document.getElementById("emptyMsg").style.display = "none";
    document.querySelector("#table thead").style.display = "";
  }

  courses.forEach(c => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${c.id}</td>
      <td>${c.name}</td>
      <td>${c.hours}h</td>
      <td>
        <button class="btn-edit" onclick="editCourse(${c.id})">✏️ Edit</button>
        <button class="btn-delete" onclick="deleteCourse(${c.id})">🗑️ Delete</button>
      </td>
    `;
    tbody.appendChild(row);
  });

  updateStats();
}

function addCourse() {
  const name = document.getElementById("courseName").value.trim();
  const hours = parseInt(document.getElementById("hours").value);

  if (!name || isNaN(hours) || hours <= 0) {
    alert("Please enter valid course name and hours");
    return;
  }

  if (isDuplicate(name)) {
    alert("This course already exists!");
    return;
  }

  courses.push({ id: nextId++, name, hours });
  localStorage.setItem("courses", JSON.stringify(courses));

  document.getElementById("courseName").value = "";
  document.getElementById("hours").value = "";

  render();
}

function deleteCourse(id) {
  if (confirm("Are you sure you want to delete this course?")) {
    courses = courses.filter(c => c.id !== id);
    localStorage.setItem("courses", JSON.stringify(courses));
    render();
  }
}

function editCourse(id) {
  const c = courses.find(x => x.id === id);

  let newName = prompt("Enter new course name:", c.name);
  if (newName === null) return;

  let newHours = prompt("Enter new credit hours:", c.hours);
  if (newHours === null) return;

  newName = newName.trim();
  const hoursVal = parseInt(newHours);

  if (!newName || isNaN(hoursVal) || hoursVal <= 0) {
    alert("Invalid input");
    return;
  }

  if (isDuplicate(newName, id)) {
    alert("This course already exists!");
    return;
  }

  c.name = newName;
  c.hours = hoursVal;

  localStorage.setItem("courses", JSON.stringify(courses));
  render();
}

render();
</script>

</body>
</html>
